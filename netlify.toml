[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback — every non-asset route serves index.html so React Router can handle it.
# This also lets Supabase OAuth callbacks (e.g. /auth?code=...) work after refresh and direct visits.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
