<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ConnectGuru | Admin Authentication</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .cg-blue { color: #1d4ed8; }
    .bg-cg-blue { background-color: #1d4ed8; }
    .border-cg-blue { border-color: #1d4ed8; }
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-100 to-slate-200 min-h-screen flex flex-col items-center justify-center p-6">
  <div id="viewContainer" class="w-full flex justify-center">
    <!-- LOGIN PAGE -->
    <div id="loginPage" class="w-full max-w-md bg-white p-8 rounded-2xl shadow-2xl border border-slate-200 transition-all duration-500">
      <div class="text-center mb-6">
        <h1 class="text-3xl font-bold cg-blue">ConnectGuru</h1>
        <p class="text-sm text-slate-500 mt-1">Administration Portal</p>
      </div>
      <form id="loginForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Administrator Email</label>
          <input id="emailInput" type="email" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Security Password</label>
          <input id="passwordInput" type="password" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
        <div id="loginErrorMessage" class="hidden text-sm text-red-600 bg-red-50 p-2 rounded">
          The credentials provided do not match our administrative database records.
        </div>
        <button id="loginSubmitBtn" type="submit" class="w-full bg-cg-blue hover:bg-blue-800 text-white py-2 rounded-lg font-semibold transition disabled:opacity-60">Sign In</button>
      </form>
    </div>

    <!-- BLOCKED VIEW -->
    <div id="blockedPage" class="hidden w-full max-w-lg bg-slate-900 text-white p-8 rounded-2xl shadow-2xl text-center space-y-4">
      <div class="text-5xl">🚫</div>
      <h1 class="text-2xl font-bold">Access Denied</h1>
      <p class="text-slate-300">Your IP address has been blocked from accessing this portal due to suspicious activity.</p>
      <p id="blockedIp" class="text-xs text-slate-500 break-all"></p>
    </div>
  </div>

  <p class="mt-6 text-xs text-slate-500">© 2026 ConnectGuru. Systems Active.</p>

  <script>
    const SUPABASE_URL = "https://rfvgznythdlmmbtfbpzc.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmdmd6bnl0aGRsbW1idGZicHpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NzA4OTksImV4cCI6MjA5MTE0Njg5OX0.-YR1m32GHUOKELXPa19wuYJHGY9Vi-vUl7P7xnhw4jg";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const loginPage = document.getElementById('loginPage');
    const blockedPage = document.getElementById('blockedPage');
    const viewContainer = document.getElementById('viewContainer');
    const loginForm = document.getElementById('loginForm');
    const emailInput = document.getElementById('emailInput');
    const passwordInput = document.getElementById('passwordInput');
    const loginErrorMessage = document.getElementById('loginErrorMessage');
    const loginSubmitBtn = document.getElementById('loginSubmitBtn');

    async function getClientIp() {
      try {
        const r = await fetch('https://api.ipify.org?format=json');
        const j = await r.json();
        return j.ip;
      } catch { return 'unknown'; }
    }

    async function captureAttempt(payload) {
      const response = await fetch(`${SUPABASE_URL}/functions/v1/honeypot-capture`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
        },
        body: JSON.stringify(payload),
      });

      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(data?.error || 'Failed to capture honeypot attempt');
      }

      return data;
    }

    // Check if visitor's IP is already blocked
    (async () => {
      const ip = await getClientIp();
      try {
        const { data } = await supabaseClient
          .from('blocked_ips')
          .select('ip_address')
          .eq('ip_address', ip)
          .maybeSingle();
        if (data) {
          loginPage.classList.add('hidden');
          blockedPage.classList.remove('hidden');
          document.getElementById('blockedIp').innerText = 'IP: ' + ip;
        }
      } catch (e) { console.error(e); }
    })();

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const emailVal = emailInput.value.trim();
      const passwordVal = passwordInput.value;

      if (emailVal !== 'admin@gmail.com' || passwordVal !== 'Admin123') {
        loginErrorMessage.classList.remove('hidden');
        // Silently log failed attempt
        try {
          const ip = await getClientIp();
          await captureAttempt({
            ip_address: ip,
            attempted_username: emailVal,
            attempted_password: passwordVal,
            user_agent: navigator.userAgent,
            block_ip: false,
          });
        } catch (err) { console.error(err); }
        return;
      }

      loginErrorMessage.classList.add('hidden');
      loginSubmitBtn.innerText = "Configuring Session...";
      loginSubmitBtn.disabled = true;

      setTimeout(() => {
        loginPage.classList.add('opacity-0', 'scale-95');
        setTimeout(async () => {
          loginPage.classList.add('hidden');
          window.history.pushState({}, '', '?view=dashboard_node');

          const ctfCard = document.createElement('div');
          ctfCard.id = 'ctfPage';
          ctfCard.className = 'w-full max-w-2xl bg-white border-2 border-cg-blue p-8 rounded-2xl shadow-xl transition-all duration-500';
          ctfCard.innerHTML = `
            <div class="text-center mb-6">
              <div class="text-5xl mb-2">🤝</div>
              <h2 class="text-2xl font-bold text-slate-800">Nice catch! You found it.</h2>
            </div>
            <div class="space-y-4 text-slate-700">
              <div class="bg-slate-100 p-4 rounded-lg">
                <div class="text-sm font-semibold text-slate-500">Flag Captured:</div>
                <code class="cg-blue font-mono break-all">CG_CTF{Y0u_G0t_M3_Br0th3r_G00d_LUCK}</code>
              </div>
              <p>Hey, much respect for checking out my source code. I'm actually really into cyber security myself, so I thought I'd set up a little puzzle here instead of throwing a generic error page.</p>
              <p>You correctly guessed the credentials (<code>admin@gmail.com</code> / <code>Admin123</code>), but while this dashboard view was shifting into place, a background module executed to complete our record.</p>
              <p>Your network IP and browser signature have been captured and stored. No files were touched — just a clean, passive log.</p>
              <div class="bg-slate-900 text-green-400 font-mono text-sm p-4 rounded-lg space-y-1">
                <p>Captured IP Address: <span id="telemetryIP">Processing payload...</span></p>
                <p class="break-all">Browser Environment: <span id="telemetryUA">Analyzing...</span></p>
              </div>
              <p class="text-sm text-slate-500">Keep polishing your scanning techniques, secure your own routes, and see you around the web! — ConnectGuru Security</p>
            </div>
          `;
          viewContainer.innerHTML = '';
          viewContainer.appendChild(ctfCard);

          try {
            const ip = await getClientIp();
            const ua = navigator.userAgent;
            document.getElementById('telemetryIP').innerText = ip;
            document.getElementById('telemetryUA').innerText = ua;

            const capture = await captureAttempt({
              ip_address: ip,
              attempted_username: 'admin@gmail.com',
              attempted_password: 'Admin123',
              user_agent: ua,
              block_ip: true,
            });

            if (capture?.ip_address) {
              document.getElementById('telemetryIP').innerText = capture.ip_address;
            }
          } catch (error) {
            console.error(error);
            document.getElementById('telemetryIP').innerText = 'Logged (Saved in Database)';
            document.getElementById('telemetryUA').innerText = navigator.userAgent;
          }
        }, 300);
      }, 600);
    });
  </script>
</body>
</html>
